<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklista olejów - Pratau</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Courier New", "SF Mono", Monaco, monospace;
      background:
        radial-gradient(ellipse at top left, rgba(255, 46, 147, 0.15), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(0, 229, 255, 0.15), transparent 50%),
        #0a0a12;
      min-height: 100vh;
      padding: 24px 16px;
      color: #e8e8f0;
      line-height: 1.5;
    }

    .container {
      background: rgba(18, 18, 30, 0.85);
      border-radius: 16px;
      padding: 28px;
      max-width: 720px;
      margin: 0 auto;
      border: 1px solid rgba(0, 229, 255, 0.3);
      box-shadow:
        0 0 20px rgba(0, 229, 255, 0.15),
        0 0 40px rgba(255, 46, 147, 0.1),
        inset 0 0 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 1px solid #00e5ff;
      box-shadow:
        0 0 15px rgba(0, 229, 255, 0.6),
        inset 0 0 10px rgba(0, 229, 255, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 500;
      margin: 0;
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(0, 229, 255, 0.8),
        0 0 20px rgba(0, 229, 255, 0.4);
      letter-spacing: 1px;
    }

    .header .subtitle {
      font-size: 13px;
      color: #ff2e93;
      text-shadow: 0 0 8px rgba(255, 46, 147, 0.6);
      letter-spacing: 0.5px;
    }

    .overall-progress {
      background: rgba(10, 10, 20, 0.6);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 255, 157, 0.3);
      box-shadow: inset 0 0 15px rgba(0, 255, 157, 0.05);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 13px;
      color: #00ff9d;
      font-weight: 500;
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .progress-count {
      font-size: 13px;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(0, 255, 157, 0.6);
    }

    .progress-bar {
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 157, 0.2);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ff9d, #00e5ff);
      transition: width 0.3s ease;
      border-radius: 999px;
      box-shadow:
        0 0 10px rgba(0, 255, 157, 0.8),
        0 0 20px rgba(0, 229, 255, 0.5);
    }

    .oils-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .oil-card {
      background: rgba(20, 20, 35, 0.7);
      border: 1px solid rgba(185, 103, 255, 0.3);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .oil-card:hover {
      border-color: rgba(185, 103, 255, 0.6);
      box-shadow: 0 0 15px rgba(185, 103, 255, 0.2);
    }

    .oil-card.complete {
      background: rgba(0, 255, 157, 0.08);
      border-color: #00ff9d;
      box-shadow:
        0 0 20px rgba(0, 255, 157, 0.4),
        inset 0 0 15px rgba(0, 255, 157, 0.05);
    }

    .oil-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .oil-header:hover {
      background: rgba(185, 103, 255, 0.05);
    }

    .oil-card.complete .oil-header:hover {
      background: rgba(0, 255, 157, 0.1);
    }

    .oil-code {
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: #faff00;
      background: rgba(250, 255, 0, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid rgba(250, 255, 0, 0.4);
      text-shadow: 0 0 6px rgba(250, 255, 0, 0.6);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
      position: relative;
    }

    .oil-code:hover {
      background: rgba(250, 255, 0, 0.2);
      box-shadow: 0 0 12px rgba(250, 255, 0, 0.5);
      transform: scale(1.05);
    }

    .oil-code:active {
      transform: scale(0.96);
    }

    .oil-code.copied,
    .oil-card.complete .oil-code.copied {
      background: rgba(0, 255, 157, 0.25) !important;
      color: #00ff9d !important;
      border-color: #00ff9d !important;
      text-shadow: 0 0 8px rgba(0, 255, 157, 0.9) !important;
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.7) !important;
    }

    .oil-card.complete .oil-code {
      background: rgba(0, 255, 157, 0.15);
      color: #00ff9d;
      border-color: rgba(0, 255, 157, 0.5);
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.6);
    }

    .oil-name {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
    }

    .oil-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .transport-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .transport-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-transform: uppercase;
      border: 1px solid;
    }

    .transport-badge.road {
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      border-color: #00e5ff;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.8);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
    }

    .transport-badge.intermodal {
      background: rgba(0, 255, 157, 0.15);
      color: #00ff9d;
      border-color: #00ff9d;
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.8);
      box-shadow: 0 0 8px rgba(0, 255, 157, 0.3);
    }

    .transport-badge.intermodal-electrical {
      background: rgba(255, 46, 147, 0.15);
      color: #ff2e93;
      border-color: #ff2e93;
      text-shadow: 0 0 6px rgba(255, 46, 147, 0.8);
      box-shadow: 0 0 8px rgba(255, 46, 147, 0.3);
    }

    .oil-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 24px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: #b967ff;
      background: rgba(185, 103, 255, 0.15);
      border-radius: 999px;
      border: 1px solid rgba(185, 103, 255, 0.5);
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
    }

    .oil-card.complete .oil-badge {
      background: #00ff9d;
      color: #0a0a12;
      border-color: #00ff9d;
      text-shadow: none;
      box-shadow: 0 0 12px rgba(0, 255, 157, 0.8);
    }

    .chevron {
      font-size: 12px;
      color: #b967ff;
      transition: transform 0.2s;
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
    }

    .oil-card.expanded .chevron {
      transform: rotate(180deg);
    }

    .oil-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .oil-card.expanded .oil-body {
      max-height: 400px;
    }

    .checklist-inner {
      padding: 4px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .check-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid rgba(185, 103, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .check-item:hover {
      border-color: rgba(0, 229, 255, 0.5);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    }

    .check-item.checked {
      background: rgba(0, 255, 157, 0.08);
      border-color: #00ff9d;
      box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
    }

    .check-item input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #00ff9d;
    }

    .check-item .content p {
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      color: #e8e8f0;
    }

    .check-item.checked .content p {
      color: #00ff9d;
      text-shadow: 0 0 4px rgba(0, 255, 157, 0.4);
    }

    .check-item .note {
      font-size: 11px;
      color: #b967ff;
      margin-top: 3px !important;
      text-shadow: 0 0 4px rgba(185, 103, 255, 0.4);
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg,
        rgba(255, 46, 147, 0.15) 0%,
        rgba(0, 229, 255, 0.15) 50%,
        rgba(0, 255, 157, 0.15) 100%);
      border: 1px solid #00ff9d;
      display: none;
      animation: neonPulse 2s ease-in-out infinite, slideIn 0.5s ease;
      box-shadow:
        0 0 20px rgba(0, 255, 157, 0.5),
        0 0 40px rgba(255, 46, 147, 0.3),
        inset 0 0 20px rgba(0, 229, 255, 0.1);
    }

    .result-box.visible {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes neonPulse {
      0%, 100% {
        box-shadow:
          0 0 20px rgba(0, 255, 157, 0.5),
          0 0 40px rgba(255, 46, 147, 0.3),
          inset 0 0 20px rgba(0, 229, 255, 0.1);
      }
      50% {
        box-shadow:
          0 0 30px rgba(0, 255, 157, 0.8),
          0 0 60px rgba(255, 46, 147, 0.5),
          inset 0 0 30px rgba(0, 229, 255, 0.2);
      }
    }

    .result-content {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .result-icon {
      font-size: 32px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(250, 255, 0, 0.8));
    }

    .result-title {
      font-size: 16px;
      font-weight: 700;
      color: #00ff9d;
      margin: 0;
      text-shadow:
        0 0 10px rgba(0, 255, 157, 0.8),
        0 0 20px rgba(0, 255, 157, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .result-message {
      font-size: 14px;
      color: #ffffff;
      line-height: 1.5;
      margin: 6px 0 0;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
    }

    .result-message strong {
      color: #faff00;
      text-shadow: 0 0 8px rgba(250, 255, 0, 0.8);
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid #b967ff;
      border-radius: 8px;
      cursor: pointer;
      color: #b967ff;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
      box-shadow: 0 0 8px rgba(185, 103, 255, 0.2);
    }

    .btn:hover {
      background: rgba(185, 103, 255, 0.15);
      box-shadow: 0 0 15px rgba(185, 103, 255, 0.5);
      color: #ffffff;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      border-color: #00e5ff;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.8);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    }

    .btn-primary:hover {
      background: rgba(0, 229, 255, 0.25);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.7);
      color: #ffffff;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      .oil-name {
        font-size: 14px;
      }
    }
    @keyframes alertBlink {
      0%, 100% {
        border-color: #ff2e93;
        box-shadow: 0 0 20px rgba(255, 46, 147, 0.6), inset 0 0 15px rgba(255, 46, 147, 0.1);
      }
      50% {
        border-color: #ff0055;
        box-shadow: 0 0 35px rgba(255, 0, 85, 0.9), inset 0 0 25px rgba(255, 0, 85, 0.2);
      }
    }

    @keyframes textFlicker {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255, 46, 147, 0.9), 0 0 20px rgba(255, 46, 147, 0.5); }
      50% { opacity: 0.85; text-shadow: 0 0 20px rgba(255, 0, 85, 1), 0 0 40px rgba(255, 0, 85, 0.7); }
    }

    .day-alert-banner {
      display: none;
      background: rgba(255, 46, 147, 0.12);
      border: 1px solid #ff2e93;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      color: #ff2e93;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      align-items: center;
      gap: 10px;
      animation: alertBlink 1.5s ease-in-out infinite;
    }

    .day-alert-banner.active {
      display: flex;
    }

    .day-alert-banner .alert-icon {
      font-size: 20px;
      animation: textFlicker 1s ease-in-out infinite;
    }

    .day-alert-banner .alert-text {
      animation: textFlicker 1.2s ease-in-out infinite;
    }

    .check-item.alert:not(.checked) {
      animation: alertBlink 1.2s ease-in-out infinite;
      background: rgba(255, 46, 147, 0.1);
    }

    .check-item.alert:not(.checked) .content p {
      color: #ff2e93;
      text-shadow: 0 0 6px rgba(255, 46, 147, 0.7);
      font-weight: 700;
    }

    .sound-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 34px;
      padding: 0;
      background: transparent;
      border: 1px solid #faff00;
      border-radius: 8px;
      cursor: pointer;
      color: #faff00;
      transition: all 0.2s;
      font-size: 16px;
      text-shadow: 0 0 6px rgba(250, 255, 0, 0.8);
      box-shadow: 0 0 8px rgba(250, 255, 0, 0.2);
    }

    .sound-toggle:hover {
      background: rgba(250, 255, 0, 0.15);
      box-shadow: 0 0 15px rgba(250, 255, 0, 0.5);
    }

    .sound-toggle.muted {
      color: #666;
      border-color: #444;
      text-shadow: none;
      box-shadow: none;
      opacity: 0.5;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      padding: 4px;
      background: rgba(10, 10, 20, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(185, 103, 255, 0.25);
    }

    .filter-pill {
      flex: 1;
      padding: 8px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      color: #b967ff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: all 0.2s;
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .filter-pill:hover {
      background: rgba(185, 103, 255, 0.1);
    }

    .filter-pill .pill-count {
      font-size: 10px;
      opacity: 0.85;
      padding: 1px 5px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 999px;
    }

    .filter-pill.active[data-filter="all"] {
      background: rgba(185, 103, 255, 0.2);
      border-color: #b967ff;
      color: #ffffff;
      box-shadow: 0 0 14px rgba(185, 103, 255, 0.6);
      text-shadow: 0 0 8px rgba(185, 103, 255, 0.9);
    }

    .filter-pill.active[data-filter="road"] {
      background: rgba(0, 229, 255, 0.18);
      border-color: #00e5ff;
      color: #ffffff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.65);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.9);
    }

    .filter-pill.active[data-filter="intermodal"] {
      background: rgba(0, 255, 157, 0.18);
      border-color: #00ff9d;
      color: #ffffff;
      box-shadow: 0 0 14px rgba(0, 255, 157, 0.65);
      text-shadow: 0 0 8px rgba(0, 255, 157, 0.9);
    }

    .oil-card.filtered-out {
      display: none;
    }

    /* Weather chip in subtitle */
    .weather-chip {
      display: none;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      padding: 2px 8px;
      background: rgba(0, 229, 255, 0.15);
      border: 1px solid #00e5ff;
      border-radius: 999px;
      font-size: 11px;
      color: #00e5ff;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.6);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 700;
    }
    .weather-chip.loaded { display: inline-flex; }

    /* Weather warning banner */
    .weather-alert-banner {
      display: none;
      background: rgba(239, 159, 39, 0.12);
      border: 1px solid #efa027;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      color: #efa027;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      align-items: center;
      gap: 10px;
      text-shadow: 0 0 8px rgba(239, 159, 39, 0.5);
      box-shadow: 0 0 15px rgba(239, 159, 39, 0.25);
    }
    .weather-alert-banner.active { display: flex; }
    .weather-alert-banner .weather-icon { font-size: 20px; }

    /* ═══════════════════════════════════════════════════════════
       LIGHT MODE — clean, office-friendly overrides
       ═══════════════════════════════════════════════════════════ */
    body.light-mode {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f0;
      color: #2c2c2a;
    }
    body.light-mode .container {
      background: #ffffff;
      border: 1px solid #e5e3dc;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      backdrop-filter: none;
    }
    body.light-mode .header h1 {
      color: #2c2c2a; text-shadow: none; letter-spacing: 0; font-weight: 500;
    }
    body.light-mode .header .subtitle {
      color: #5f5e5a; text-shadow: none; letter-spacing: 0;
    }
    body.light-mode .icon-circle {
      background: #e6f1fb; color: #185fa5; border: none; box-shadow: none;
    }
    body.light-mode .overall-progress {
      background: #f9f8f3; border-color: #e5e3dc; box-shadow: none;
    }
    body.light-mode .progress-label {
      color: #5f5e5a; text-shadow: none; text-transform: none;
      letter-spacing: 0; font-weight: 500;
    }
    body.light-mode .progress-count {
      color: #2c2c2a; text-shadow: none; font-weight: 500;
    }
    body.light-mode .progress-bar { background: #e5e3dc; border: none; }
    body.light-mode .progress-bar-fill {
      background: #1d9e75; box-shadow: none;
    }
    body.light-mode .filter-bar {
      background: #f9f8f3; border-color: #e5e3dc;
    }
    body.light-mode .filter-pill {
      color: #5f5e5a; text-shadow: none; font-weight: 500;
      text-transform: none; letter-spacing: 0;
    }
    body.light-mode .filter-pill .pill-count {
      background: rgba(0,0,0,0.06); color: #444441;
    }
    body.light-mode .filter-pill.active[data-filter="all"] {
      background: #eeedfe; border-color: #7f77dd; color: #3c3489;
      box-shadow: none; text-shadow: none;
    }
    body.light-mode .filter-pill.active[data-filter="road"] {
      background: #e6f1fb; border-color: #378add; color: #185fa5;
      box-shadow: none; text-shadow: none;
    }
    body.light-mode .filter-pill.active[data-filter="intermodal"] {
      background: #e1f5ee; border-color: #1d9e75; color: #0f6e56;
      box-shadow: none; text-shadow: none;
    }
    body.light-mode .oil-card {
      background: #ffffff; border-color: #e5e3dc;
    }
    body.light-mode .oil-card:hover {
      border-color: #b4b2a9; box-shadow: none;
    }
    body.light-mode .oil-card.complete {
      background: #f4faec; border-color: #97c459; box-shadow: none;
    }
    body.light-mode .oil-header:hover { background: #f9f8f3; }

    const MESSAGES = [

      { title: "👑 Cesarz Olejów", message: 'Zostałeś oficjalnie mianowany <strong>Cesarzem Olejów Pratau</strong>. Bez benefitów, bez pensji, bez wolnego.' },
      { title: "🥇 GG WP Robert", message: 'Zaplanowałeś wszystko. Niemcy w szoku. Fabryka w Pratau <strong>bije brawo</strong>.' },
      { title: "🚚 Ciężarówki drżą", message: 'Wszystkie ciężarówki już wiedzą gdzie jechać. <strong>Grzegorz z Bunge</strong> też ma spokojną noc.' },
      { title: "🧠 Big brain time", message: 'Twój mózg właśnie wykonał pracę za <strong>3 osoby</strong>. Manager tego nie zauważy, ale my tak.' },
      { title: "🎯 Perfect run", message: 'Zero błędów. Zero minusów. Zero reklamacji. <strong>100% Robert</strong>.' }
    ];

    // Build the DOM
    const oilsList = document.getElementById("oilsList");
    let totalChecks = 0;

    const TRANSPORT_LABELS = {
      "road": "Road",
      "intermodal": "Intermodal",
      "intermodal-electrical": "Intermodal Electrical"
    };

    OILS.forEach((oil, oilIdx) => {
      const card = document.createElement("div");
      card.className = "oil-card";

      const transportBadges = oil.transport
        .map(t => `<span class="transport-badge ${t}">${TRANSPORT_LABELS[t]}</span>`)

      const header = document.createElement("div");

      oil.checks.forEach((checkKey, checkIdx) => {
        const check = CHECKS[checkKey];

        const label = document.createElement("label");

          <input type="checkbox" data-oil="${oilIdx}" data-check="${checkIdx}">

    // Update logic
    const progressBar = document.getElementById("progressBar");
    const progressCount = document.getElementById("progressCount");
    const resultBox = document.getElementById("resultBox");

    let lastAllComplete = false;

    function update(userAction) {
      let checkedTotal = 0;
      const newlyCompletedCards = [];

      OILS.forEach((oil, oilIdx) => {
        const card = document.querySelector(`.oil-card[data-oil-idx="${oilIdx}"]`);
        const checkboxes = card.querySelectorAll('input[type="checkbox"]');
        const badge = card.querySelector("[data-badge]");
        const wasComplete = card.classList.contains("complete");
        let checkedInOil = 0;

        checkboxes.forEach(cb => {
          const item = cb.closest(".check-item");
          if (cb.checked) {
            item.classList.add("checked");
            checkedInOil++;
            checkedTotal++;
          } else {
            item.classList.remove("checked");
          }
        });

        badge.textContent = `${checkedInOil}/${oil.checks.length}`;

        const isComplete = checkedInOil === oil.checks.length;
        if (isComplete) {
          card.classList.add("complete");
          badge.textContent = "✓";
          if (userAction && !wasComplete) {
            newlyCompletedCards.push(card);
          }
        } else {
          card.classList.remove("complete");
        }
      });

      const pct = Math.round((checkedTotal / totalChecks) * 100);
      progressBar.style.width = pct + "%";
      progressCount.textContent = `${checkedTotal} / ${totalChecks}`;

      const allComplete = checkedTotal === totalChecks;

      // Random sarcastic message on transition to all-complete
      if (allComplete && !lastAllComplete) {

          setTimeout(() => launchConfetti(), 300);

      } else {
        resultBox.classList.remove("visible");
      }

      updateDayAlerts();

      // Update filter pill counts + apply current filter
      updatePillCounts();
      applyFilter();

      saveState();

    // ── Copy oil code to clipboard ────────────────────────────────
    async function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
      }
      // Fallback for file:// or older browsers
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "-1000px";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
      return ok;
    }

    document.querySelectorAll(".oil-code").forEach(codeEl => {
      codeEl.addEventListener("click", async e => {
        e.stopPropagation(); // don't toggle the card
        const code = codeEl.dataset.code;
        const originalText = codeEl.textContent;
        const ok = await copyToClipboard(code);
        if (ok) {
          codeEl.textContent = "✓ SKOPIOWANO";
          codeEl.classList.add("copied");
          if (soundsEnabled) playBeep(1100, 0.09, "sine", 0.05);
          setTimeout(() => {
            codeEl.textContent = originalText;
            codeEl.classList.remove("copied");
          }, 1200);
        }
      });
    });

    // ── Transport filter ──────────────────────────────────────────
    let currentFilter = "all";
    try {
      const stored = localStorage.getItem("pratauFilter");
      if (stored === "all" || stored === "road" || stored === "intermodal") {
        currentFilter = stored;
      }
    } catch (e) {}

    function matchesFilter(oil, filter) {
      if (filter === "all") return true;
      const hasRoad = oil.transport.includes("road");
      const hasIntermodal = oil.transport.some(t => t === "intermodal" || t === "intermodal-electrical");
      if (filter === "road") return hasRoad && !hasIntermodal;
      if (filter === "intermodal") return hasIntermodal && !hasRoad;
      return true;
    }

    function updatePillCounts() {
      ["all", "road", "intermodal"].forEach(filter => {
        const matching = OILS.filter(oil => matchesFilter(oil, filter));
        let complete = 0;
        matching.forEach(oil => {
          const idx = OILS.indexOf(oil);
          const card = document.querySelector(`.oil-card[data-oil-idx="${idx}"]`);
          if (card && card.classList.contains("complete")) complete++;
        });
        const el = document.querySelector(`[data-count="${filter}"]`);
        if (el) el.textContent = `${complete}/${matching.length}`;
      });
    }

    function applyFilter() {
      document.querySelectorAll(".oil-card").forEach(card => {
        const oilIdx = parseInt(card.dataset.oilIdx);
        const oil = OILS[oilIdx];
        card.classList.toggle("filtered-out", !matchesFilter(oil, currentFilter));
      });
      document.querySelectorAll(".filter-pill").forEach(p => {
        p.classList.toggle("active", p.dataset.filter === currentFilter);
      });
    }

    document.querySelectorAll(".filter-pill").forEach(pill => {

        currentFilter = pill.dataset.filter;
        try { localStorage.setItem("pratauFilter", currentFilter); } catch (e) {}
        applyFilter();
        // Soft click sound
        if (soundsEnabled) playBeep(660, 0.05, "sine", 0.04);
      });
    });

    // ── Random sarcastic message ──────────────────────────────────

      const pick = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];

      resultMessageEl.innerHTML = pick.message;
    }

    // ── Day-of-week alerts ────────────────────────────────────────
    const dayAlertBanner = document.getElementById("dayAlertBanner");
    const dayAlertText = document.getElementById("dayAlertText");
    function updateDayAlerts() {
      const today = new Date().getDay(); // 0=Sun, 1=Mon, 2=Tue, ...
      let bannerMessages = [];

      OILS.forEach((oil, oilIdx) => {
        oil.checks.forEach((checkKey, checkIdx) => {
          const check = CHECKS[checkKey];
          const cb = document.querySelector(
            `input[data-oil="${oilIdx}"][data-check="${checkIdx}"]`
          );
          if (!cb) return;
          const item = cb.closest(".check-item");
          const isAlertDay = check.alertDay === today;
          if (isAlertDay) {
            item.classList.add("alert");
            if (!cb.checked && check.alertMessage) {
              bannerMessages.push(check.alertMessage);
            }
          } else {
            item.classList.remove("alert");
          }
        });
      });

      if (bannerMessages.length > 0) {
        dayAlertText.textContent = bannerMessages.join(" · ");
        dayAlertBanner.classList.add("active");
      } else {
        dayAlertBanner.classList.remove("active");
      }
    }

    // ── Sound system (Web Audio API) ──────────────────────────────
    let audioCtx = null;
    let soundsEnabled = true;
    try {
      const stored = localStorage.getItem("pratauSoundsEnabled");
      if (stored === "false") soundsEnabled = false;
    } catch (e) {}

    function getAudioContext() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) { return null; }
      }
      return audioCtx;
    }

    function playBeep(freq, duration, type, volume) {
      if (!soundsEnabled) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type || "square";
      const t0 = ctx.currentTime;
      osc.frequency.setValueAtTime(freq, t0);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.5, t0 + duration * 0.5);
      gain.gain.setValueAtTime(volume || 0.08, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.start(t0);
      osc.stop(t0 + duration);
    }

    function playCheckBeep() {
      playBeep(880, 0.08, "square", 0.06);
    }
    function playUncheckBeep() {
      if (!soundsEnabled) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "square";
      const t0 = ctx.currentTime;
      osc.frequency.setValueAtTime(440, t0);
      osc.frequency.exponentialRampToValueAtTime(220, t0 + 0.08);
      gain.gain.setValueAtTime(0.04, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.1);
      osc.start(t0); osc.stop(t0 + 0.1);
    }

    function playVictory() {
      if (!soundsEnabled) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      // C major arpeggio + high finale
      const notes = [
        { freq: 523.25, delay: 0.00, dur: 0.15 }, // C5
        { freq: 659.25, delay: 0.10, dur: 0.15 }, // E5
        { freq: 783.99, delay: 0.20, dur: 0.15 }, // G5
        { freq: 1046.5, delay: 0.30, dur: 0.5 },  // C6 - finale
        { freq: 1318.5, delay: 0.30, dur: 0.5 },  // E6 harmony
      ];
      notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "triangle";
        osc.frequency.value = n.freq;
        const t0 = ctx.currentTime + n.delay;
        gain.gain.setValueAtTime(0.15, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + n.dur);
        osc.start(t0); osc.stop(t0 + n.dur);
      });
      // Extra sparkle: fast rising chirp
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "sawtooth";
        const t0 = ctx.currentTime;
        osc.frequency.setValueAtTime(400, t0);
        osc.frequency.exponentialRampToValueAtTime(2000, t0 + 0.4);
        gain.gain.setValueAtTime(0.08, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
        osc.start(t0); osc.stop(t0 + 0.4);
      }, 800);
    }

    // Sound toggle button
    const soundToggle = document.getElementById("soundToggle");
    function refreshSoundToggle() {
      soundToggle.textContent = soundsEnabled ? "🔊" : "🔇";
      soundToggle.classList.toggle("muted", !soundsEnabled);
    }
    refreshSoundToggle();
    soundToggle.addEventListener("click", () => {
      soundsEnabled = !soundsEnabled;
      refreshSoundToggle();
      try { localStorage.setItem("pratauSoundsEnabled", soundsEnabled ? "true" : "false"); } catch (e) {}
      if (soundsEnabled) playCheckBeep(); // audio preview + unlocks context
    });

    // localStorage persistence
    function saveState() {
      const state = {};
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        state[`${cb.dataset.oil}-${cb.dataset.check}`] = cb.checked;
      });
      try {
        localStorage.setItem("pratauOilsChecklist", JSON.stringify(state));
      } catch (e) {}
    }

    function loadState() {
      try {
        const stored = localStorage.getItem("pratauOilsChecklist");
        if (!stored) return;
        const state = JSON.parse(stored);
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          const key = `${cb.dataset.oil}-${cb.dataset.check}`;
          if (state[key]) cb.checked = true;
        });
      } catch (e) {}
    }

    // Attach listeners
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) playCheckBeep();
        else playUncheckBeep();
        update(true);
      });
      // Prevent card from toggling when clicking checkbox
      cb.addEventListener("click", e => e.stopPropagation());
    });

    let resetArmed = false;
    let resetTimeout = null;
    const resetBtn = document.getElementById("resetBtn");
    const resetBtnOriginalText = resetBtn.textContent;

    resetBtn.addEventListener("click", () => {
      if (!resetArmed) {
        resetArmed = true;
        resetBtn.textContent = "Kliknij ponownie aby potwierdzić";
        resetBtn.style.background = "rgba(255, 46, 147, 0.2)";
        resetBtn.style.borderColor = "#ff2e93";
        resetBtn.style.color = "#ff2e93";
        resetBtn.style.textShadow = "0 0 8px rgba(255, 46, 147, 0.8)";
        resetBtn.style.boxShadow = "0 0 15px rgba(255, 46, 147, 0.5)";
        resetTimeout = setTimeout(() => {
          resetArmed = false;
          resetBtn.textContent = resetBtnOriginalText;
          resetBtn.style.background = "";
          resetBtn.style.borderColor = "";
          resetBtn.style.color = "";
          resetBtn.style.textShadow = "";
          resetBtn.style.boxShadow = "";
        }, 3000);
        return;
      }
      clearTimeout(resetTimeout);
      resetArmed = false;
      resetBtn.textContent = resetBtnOriginalText;
      resetBtn.style.background = "";
      resetBtn.style.borderColor = "";
      resetBtn.style.color = "";
      resetBtn.style.textShadow = "";
      resetBtn.style.boxShadow = "";
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => (cb.checked = false));
      try { localStorage.removeItem("pratauOilsChecklist"); } catch (e) {}
      lastAllComplete = false;
      update(false);
    });

    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".oil-card").forEach(c => c.classList.add("expanded"));
    });

    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".oil-card").forEach(c => c.classList.remove("expanded"));
    });

    // ── Theme toggle (Neon / Light) ───────────────────────────────
    const themeToggle = document.getElementById("themeToggle");
    let currentTheme = "neon";
    try {
      const stored = localStorage.getItem("pratauTheme");
      if (stored === "light") currentTheme = "light";
    } catch (e) {}

    function applyTheme() {
      if (currentTheme === "light") {
        document.body.classList.add("light-mode");
        themeToggle.textContent = "🌙";
      } else {
        document.body.classList.remove("light-mode");
        themeToggle.textContent = "☀️";
      }
    }
    applyTheme();

    themeToggle.addEventListener("click", () => {
      currentTheme = currentTheme === "neon" ? "light" : "neon";
      try { localStorage.setItem("pratauTheme", currentTheme); } catch (e) {}
      applyTheme();
      if (soundsEnabled) playBeep(660, 0.06, "sine", 0.04);
    });

    // ── Confetti (canvas particles) ───────────────────────────────
    function launchConfetti() {
      const canvas = document.createElement("canvas");
      canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const isLight = document.body.classList.contains("light-mode");
      const colors = isLight
        ? ["#378add", "#1d9e75", "#d4537e", "#7f77dd", "#efa027", "#e24b4a"]
        : ["#00e5ff", "#00ff9d", "#ff2e93", "#b967ff", "#faff00"];
      const particles = [];

      const spawnBurst = (ox, oy, count) => {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 6 + Math.random() * 16;
          particles.push({
            x: ox, y: oy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 8,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 4 + Math.random() * 9,
            rot: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.4,
            life: 1
          });
        }
      };

      // Three cannons from bottom
      spawnBurst(canvas.width * 0.2, canvas.height * 0.95, 60);
      setTimeout(() => spawnBurst(canvas.width * 0.5, canvas.height * 0.95, 90), 120);
      setTimeout(() => spawnBurst(canvas.width * 0.8, canvas.height * 0.95, 60), 240);

      let frame = 0;
      const maxFrames = 260;

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.vy += 0.35;
          p.vx *= 0.99;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.spin;
          p.life -= 0.005;
          if (p.life <= 0) continue;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          if (!isLight) {
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 12;
          }
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.55);
          ctx.restore();
        }
        frame++;
        if (frame < maxFrames) requestAnimationFrame(animate);
        else canvas.remove();
      }
      animate();
    }

    // ── Weather (Open-Meteo, no API key) ──────────────────────────
    // Pratau is a village near Lutherstadt Wittenberg
    const PRATAU_LAT = 51.867;
    const PRATAU_LON = 12.646;

    function weatherCodeInfo(code) {
      // WMO weather codes → { icon, label, warning }
      if ([45, 48].includes(code))                    return { icon: "🌫️", label: "mgła", warning: true, name: "mgła" };
      if ([71, 73, 75, 77, 85, 86].includes(code))    return { icon: "❄️", label: "śnieg", warning: true, name: "śnieg" };
      if ([95, 96, 99].includes(code))                return { icon: "⛈️", label: "burza", warning: true, name: "burza" };
      if ([65, 67, 82].includes(code))                return { icon: "🌧️", label: "ulewa", warning: true, name: "ulewny deszcz" };
      if ([61, 63, 80, 81].includes(code))            return { icon: "🌧️", label: "deszcz", warning: false, name: "deszcz" };
      if ([51, 53, 55, 56, 57, 66].includes(code))    return { icon: "🌦️", label: "mżawka", warning: false, name: "mżawka" };
      if (code === 0)                                  return { icon: "☀️", label: "słońce", warning: false, name: "słonecznie" };
      if (code === 1)                                  return { icon: "🌤️", label: "pogodnie", warning: false, name: "pogodnie" };
      if (code === 2)                                  return { icon: "⛅", label: "częściowe zachmurzenie", warning: false, name: "częściowe zachmurzenie" };
      if (code === 3)                                  return { icon: "☁️", label: "zachmurzenie", warning: false, name: "pochmurno" };
      return { icon: "🌡️", label: "pogoda", warning: false, name: "" };
    }

    async function fetchWeather() {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${PRATAU_LAT}&longitude=${PRATAU_LON}&current=weather_code,temperature_2m&timezone=auto`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        const code = data.current.weather_code;
        const temp = Math.round(data.current.temperature_2m);
        const info = weatherCodeInfo(code);

        // Update chip in subtitle
        const chip = document.getElementById("weatherChip");
        chip.innerHTML = `<span>${info.icon}</span><span>${temp}°C</span>`;
        chip.classList.add("loaded");

        // Show warning banner if bad weather
        const banner = document.getElementById("weatherAlertBanner");
        const bannerIcon = document.getElementById("weatherAlertIcon");
        const bannerText = document.getElementById("weatherAlertText");
        if (info.warning) {
          bannerIcon.textContent = info.icon;
          bannerText.textContent = `Uwaga: ${info.name} w okolicy Pratau (Lutherstadt Wittenberg), dostawy mogą się opóźnić`;
          banner.classList.add("active");
        } else {
          banner.classList.remove("active");
        }
      } catch (e) {
        // Silent fail — offline or CORS
      }
    }

    fetchWeather();
    // Refresh weather every 30 min
    setInterval(fetchWeather, 30 * 60 * 1000);

    // Initial load
    loadState();
    update(false);
    // All cards start collapsed — user expands what they need
  </script>

</body>
