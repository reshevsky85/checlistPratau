<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklista olejów - Pratau</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Courier New", "SF Mono", Monaco, monospace;
      background:
        radial-gradient(ellipse at top left, rgba(255, 46, 147, 0.15), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(0, 229, 255, 0.15), transparent 50%),
        #0a0a12;
      min-height: 100vh;
      padding: 24px 16px;
      color: #e8e8f0;
      line-height: 1.5;
    }

    .container {
      background: rgba(18, 18, 30, 0.85);
      border-radius: 16px;
      padding: 28px;
      max-width: 720px;
      margin: 0 auto;
      border: 1px solid rgba(0, 229, 255, 0.3);
      box-shadow:
        0 0 20px rgba(0, 229, 255, 0.15),
        0 0 40px rgba(255, 46, 147, 0.1),
        inset 0 0 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 1px solid #00e5ff;
      box-shadow:
        0 0 15px rgba(0, 229, 255, 0.6),
        inset 0 0 10px rgba(0, 229, 255, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 500;
      margin: 0;
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(0, 229, 255, 0.8),
        0 0 20px rgba(0, 229, 255, 0.4);
      letter-spacing: 1px;
    }

    .header .subtitle {
      font-size: 13px;
      color: #ff2e93;
      text-shadow: 0 0 8px rgba(255, 46, 147, 0.6);
      letter-spacing: 0.5px;
    }

    .overall-progress {
      background: rgba(10, 10, 20, 0.6);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 255, 157, 0.3);
      box-shadow: inset 0 0 15px rgba(0, 255, 157, 0.05);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 13px;
      color: #00ff9d;
      font-weight: 500;
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .progress-count {
      font-size: 13px;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(0, 255, 157, 0.6);
    }

    .progress-bar {
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 157, 0.2);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ff9d, #00e5ff);
      transition: width 0.3s ease;
      border-radius: 999px;
      box-shadow:
        0 0 10px rgba(0, 255, 157, 0.8),
        0 0 20px rgba(0, 229, 255, 0.5);
    }

    .oils-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .oil-card {
      background: rgba(20, 20, 35, 0.7);
      border: 1px solid rgba(185, 103, 255, 0.3);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .oil-card:hover {
      border-color: rgba(185, 103, 255, 0.6);
      box-shadow: 0 0 15px rgba(185, 103, 255, 0.2);
    }

    .oil-card.complete {
      background: rgba(0, 255, 157, 0.08);
      border-color: #00ff9d;
      box-shadow:
        0 0 20px rgba(0, 255, 157, 0.4),
        inset 0 0 15px rgba(0, 255, 157, 0.05);
    }

    .oil-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .oil-header:hover {
      background: rgba(185, 103, 255, 0.05);
    }

    .oil-card.complete .oil-header:hover {
      background: rgba(0, 255, 157, 0.1);
    }

    .oil-code {
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: #faff00;
      background: rgba(250, 255, 0, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid rgba(250, 255, 0, 0.4);
      text-shadow: 0 0 6px rgba(250, 255, 0, 0.6);
      font-weight: 700;
    }

    .oil-card.complete .oil-code {
      background: rgba(0, 255, 157, 0.15);
      color: #00ff9d;
      border-color: rgba(0, 255, 157, 0.5);
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.6);
    }

    .oil-name {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
    }

    .oil-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .transport-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .transport-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-transform: uppercase;
      border: 1px solid;
    }

    .transport-badge.road {
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      border-color: #00e5ff;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.8);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
    }

    .transport-badge.intermodal {
      background: rgba(0, 255, 157, 0.15);
      color: #00ff9d;
      border-color: #00ff9d;
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.8);
      box-shadow: 0 0 8px rgba(0, 255, 157, 0.3);
    }

    .transport-badge.intermodal-electrical {
      background: rgba(255, 46, 147, 0.15);
      color: #ff2e93;
      border-color: #ff2e93;
      text-shadow: 0 0 6px rgba(255, 46, 147, 0.8);
      box-shadow: 0 0 8px rgba(255, 46, 147, 0.3);
    }

    .oil-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 24px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: #b967ff;
      background: rgba(185, 103, 255, 0.15);
      border-radius: 999px;
      border: 1px solid rgba(185, 103, 255, 0.5);
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
    }

    .oil-card.complete .oil-badge {
      background: #00ff9d;
      color: #0a0a12;
      border-color: #00ff9d;
      text-shadow: none;
      box-shadow: 0 0 12px rgba(0, 255, 157, 0.8);
    }

    .chevron {
      font-size: 12px;
      color: #b967ff;
      transition: transform 0.2s;
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
    }

    .oil-card.expanded .chevron {
      transform: rotate(180deg);
    }

    .oil-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .oil-card.expanded .oil-body {
      max-height: 400px;
    }

    .checklist-inner {
      padding: 4px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .check-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid rgba(185, 103, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .check-item:hover {
      border-color: rgba(0, 229, 255, 0.5);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    }

    .check-item.checked {
      background: rgba(0, 255, 157, 0.08);
      border-color: #00ff9d;
      box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
    }

    .check-item input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #00ff9d;
    }

    .check-item .content p {
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      color: #e8e8f0;
    }

    .check-item.checked .content p {
      color: #00ff9d;
      text-shadow: 0 0 4px rgba(0, 255, 157, 0.4);
    }

    .check-item .note {
      font-size: 11px;
      color: #b967ff;
      margin-top: 3px !important;
      text-shadow: 0 0 4px rgba(185, 103, 255, 0.4);
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg,
        rgba(255, 46, 147, 0.15) 0%,
        rgba(0, 229, 255, 0.15) 50%,
        rgba(0, 255, 157, 0.15) 100%);
      border: 1px solid #00ff9d;
      display: none;
      animation: neonPulse 2s ease-in-out infinite, slideIn 0.5s ease;
      box-shadow:
        0 0 20px rgba(0, 255, 157, 0.5),
        0 0 40px rgba(255, 46, 147, 0.3),
        inset 0 0 20px rgba(0, 229, 255, 0.1);
    }

    .result-box.visible {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes neonPulse {
      0%, 100% {
        box-shadow:
          0 0 20px rgba(0, 255, 157, 0.5),
          0 0 40px rgba(255, 46, 147, 0.3),
          inset 0 0 20px rgba(0, 229, 255, 0.1);
      }
      50% {
        box-shadow:
          0 0 30px rgba(0, 255, 157, 0.8),
          0 0 60px rgba(255, 46, 147, 0.5),
          inset 0 0 30px rgba(0, 229, 255, 0.2);
      }
    }

    .result-content {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .result-icon {
      font-size: 32px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(250, 255, 0, 0.8));
    }

    .result-title {
      font-size: 16px;
      font-weight: 700;
      color: #00ff9d;
      margin: 0;
      text-shadow:
        0 0 10px rgba(0, 255, 157, 0.8),
        0 0 20px rgba(0, 255, 157, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .result-message {
      font-size: 14px;
      color: #ffffff;
      line-height: 1.5;
      margin: 6px 0 0;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
    }

    .result-message strong {
      color: #faff00;
      text-shadow: 0 0 8px rgba(250, 255, 0, 0.8);
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid #b967ff;
      border-radius: 8px;
      cursor: pointer;
      color: #b967ff;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      text-shadow: 0 0 6px rgba(185, 103, 255, 0.6);
      box-shadow: 0 0 8px rgba(185, 103, 255, 0.2);
    }

    .btn:hover {
      background: rgba(185, 103, 255, 0.15);
      box-shadow: 0 0 15px rgba(185, 103, 255, 0.5);
      color: #ffffff;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      border-color: #00e5ff;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.8);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    }

    .btn-primary:hover {
      background: rgba(0, 229, 255, 0.25);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.7);
      color: #ffffff;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      .oil-name {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="icon-circle">💧</div>
      <div>
        <h1>Planowanie olejów roślinnych</h1>
        <p class="subtitle">Fabryka Pratau, Niemcy</p>
      </div>
    </div>

    <div class="overall-progress">
      <div class="progress-header">
        <span class="progress-label">Postęp całkowity</span>
        <span class="progress-count" id="progressCount">0 / 23</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="oils-list" id="oilsList"></div>

    <div class="result-box" id="resultBox">
      <div class="result-content">
        <span class="result-icon">🏆</span>
        <div>
          <p class="result-title">🎉 Brawo Robert!</p>
          <p class="result-message">Wygrałeś bon do Sodex, wartość <strong>5 PLN</strong> hehe 😏</p>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="expandAllBtn">Rozwiń wszystkie</button>
      <button class="btn" id="collapseAllBtn">Zwiń wszystkie</button>
      <button class="btn" id="resetBtn">↻ Resetuj</button>
    </div>
  </div>

  <script>
    // Common checklist items (reused across oils)
    const CHECKS = {
      stock: {
        text: "Czy utrzymuję stok pomiędzy dolną a górną czerwoną linią?"
      },
      coverage: {
        text: "Czy jestem wystarczająco pokryty w kolejnym weeku?",
        note: "Zależy od TT"
      },
      delivery: {
        text: "Czy zaplanowałem dostawę minimum 1 dzień przed minusem?",
        note: "Dotyczy: Coconut oil, Palm oil, inES48"
      },
      shelfLife: {
        text: "Czy zaplanowałem ilość tylko pod produkcję, uwzględniając Shelf Life?",
        note: "Dotyczy: mix inES44/inES30"
      },
      safetyStock: {
        text: "Czy ogarnąłem 3x Safety Stoki?"
      },
      bungeLoading: {
        text: "Czy ogarnąłem załadunki z Bunge z Grzegorzem?"
      },
      posTuesday: {
        text: "Czy wysłałem POsy we wtorek do dostawcy?"
      },
      refining: {
        text: "Czy ogarnąłem rafinację?"
      }
    };

    // Oil definitions
    const OILS = [
      { code: "1044578", name: "Rapeseed oil", transport: ["road"], checks: ["stock", "coverage", "safetyStock"] },
      { code: "1044587", name: "Sunflower oil", transport: ["road"], checks: ["stock", "coverage"] },
      { code: "91101741", name: "inES30_inES44", transport: ["road"], checks: ["shelfLife"] },
      { code: "91100730", name: "erE130 SF", transport: ["road", "intermodal"], checks: ["stock", "coverage"] },
      { code: "91101280", name: "erES148", transport: ["road", "intermodal"], checks: ["stock", "coverage"] },
      { code: "91100760", name: "erES80 SG pressed", transport: ["road", "intermodal"], checks: ["stock", "coverage", "bungeLoading"] },
      { code: "91101963", name: "LNSF", transport: ["road", "intermodal"], checks: ["stock", "coverage", "posTuesday"] },
      { code: "388212", name: "Coconut oil", transport: ["intermodal"], checks: ["coverage", "delivery"] },
      { code: "1044558", name: "Palm oil", transport: ["intermodal"], checks: ["coverage", "delivery"] },
      { code: "67230409", name: "inES48 SG", transport: ["intermodal-electrical"], checks: ["coverage", "delivery", "refining"] }
    ];

    // Build the DOM
    const oilsList = document.getElementById("oilsList");
    let totalChecks = 0;

    const TRANSPORT_LABELS = {
      "road": "Road",
      "intermodal": "Intermodal",
      "intermodal-electrical": "Intermodal Electrical"
    };

    OILS.forEach((oil, oilIdx) => {
      const card = document.createElement("div");
      card.className = "oil-card";
      card.dataset.oilIdx = oilIdx;

      const transportBadges = oil.transport
        .map(t => `<span class="transport-badge ${t}">${TRANSPORT_LABELS[t]}</span>`)
        .join("");

      const header = document.createElement("div");
      header.className = "oil-header";
      header.innerHTML = `
        <span class="oil-code">${oil.code}</span>
        <div class="oil-info">
          <div class="oil-name">${oil.name}</div>
          <div class="transport-badges">${transportBadges}</div>
        </div>
        <span class="oil-badge" data-badge>0/${oil.checks.length}</span>
        <span class="chevron">▼</span>
      `;

      const body = document.createElement("div");
      body.className = "oil-body";
      const inner = document.createElement("div");
      inner.className = "checklist-inner";

      oil.checks.forEach((checkKey, checkIdx) => {
        const check = CHECKS[checkKey];
        totalChecks++;

        const label = document.createElement("label");
        label.className = "check-item";
        label.innerHTML = `
          <input type="checkbox" data-oil="${oilIdx}" data-check="${checkIdx}">
          <div class="content">
            <p>${check.text}</p>
            ${check.note ? `<p class="note">${check.note}</p>` : ""}
          </div>
        `;
        inner.appendChild(label);
      });

      body.appendChild(inner);
      card.appendChild(header);
      card.appendChild(body);
      oilsList.appendChild(card);

      // Toggle expand/collapse on header click
      header.addEventListener("click", () => {
        card.classList.toggle("expanded");
      });
    });

    // Update logic
    const progressBar = document.getElementById("progressBar");
    const progressCount = document.getElementById("progressCount");
    const resultBox = document.getElementById("resultBox");

    function update() {
      let checkedTotal = 0;

      OILS.forEach((oil, oilIdx) => {
        const card = document.querySelector(`.oil-card[data-oil-idx="${oilIdx}"]`);
        const checkboxes = card.querySelectorAll('input[type="checkbox"]');
        const badge = card.querySelector("[data-badge]");
        let checkedInOil = 0;

        checkboxes.forEach(cb => {
          const item = cb.closest(".check-item");
          if (cb.checked) {
            item.classList.add("checked");
            checkedInOil++;
            checkedTotal++;
          } else {
            item.classList.remove("checked");
          }
        });

        badge.textContent = `${checkedInOil}/${oil.checks.length}`;

        if (checkedInOil === oil.checks.length) {
          card.classList.add("complete");
          badge.textContent = "✓";
        } else {
          card.classList.remove("complete");
        }
      });

      const pct = Math.round((checkedTotal / totalChecks) * 100);
      progressBar.style.width = pct + "%";
      progressCount.textContent = `${checkedTotal} / ${totalChecks}`;

      if (checkedTotal === totalChecks) {
        resultBox.classList.add("visible");
      } else {
        resultBox.classList.remove("visible");
      }

      // Save state
      saveState();
    }

    // localStorage persistence
    function saveState() {
      const state = {};
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        state[`${cb.dataset.oil}-${cb.dataset.check}`] = cb.checked;
      });
      try {
        localStorage.setItem("pratauOilsChecklist", JSON.stringify(state));
      } catch (e) {}
    }

    function loadState() {
      try {
        const stored = localStorage.getItem("pratauOilsChecklist");
        if (!stored) return;
        const state = JSON.parse(stored);
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          const key = `${cb.dataset.oil}-${cb.dataset.check}`;
          if (state[key]) cb.checked = true;
        });
      } catch (e) {}
    }

    // Attach listeners
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener("change", update);
      // Prevent card from toggling when clicking checkbox
      cb.addEventListener("click", e => e.stopPropagation());
    });

    let resetArmed = false;
    let resetTimeout = null;
    const resetBtn = document.getElementById("resetBtn");
    const resetBtnOriginalText = resetBtn.textContent;

    resetBtn.addEventListener("click", () => {
      if (!resetArmed) {
        resetArmed = true;
        resetBtn.textContent = "Kliknij ponownie aby potwierdzić";
        resetBtn.style.background = "rgba(255, 46, 147, 0.2)";
        resetBtn.style.borderColor = "#ff2e93";
        resetBtn.style.color = "#ff2e93";
        resetBtn.style.textShadow = "0 0 8px rgba(255, 46, 147, 0.8)";
        resetBtn.style.boxShadow = "0 0 15px rgba(255, 46, 147, 0.5)";
        resetTimeout = setTimeout(() => {
          resetArmed = false;
          resetBtn.textContent = resetBtnOriginalText;
          resetBtn.style.background = "";
          resetBtn.style.borderColor = "";
          resetBtn.style.color = "";
          resetBtn.style.textShadow = "";
          resetBtn.style.boxShadow = "";
        }, 3000);
        return;
      }
      clearTimeout(resetTimeout);
      resetArmed = false;
      resetBtn.textContent = resetBtnOriginalText;
      resetBtn.style.background = "";
      resetBtn.style.borderColor = "";
      resetBtn.style.color = "";
      resetBtn.style.textShadow = "";
      resetBtn.style.boxShadow = "";
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => (cb.checked = false));
      try { localStorage.removeItem("pratauOilsChecklist"); } catch (e) {}
      update();
    });

    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".oil-card").forEach(c => c.classList.add("expanded"));
    });

    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".oil-card").forEach(c => c.classList.remove("expanded"));
    });

    // Initial load
    loadState();
    update();
    // Expand first card by default if nothing checked
    if (!document.querySelector('input[type="checkbox"]:checked')) {
      document.querySelector(".oil-card").classList.add("expanded");
    }
  </script>

</body>
</html>
